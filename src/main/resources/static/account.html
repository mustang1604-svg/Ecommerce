<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табулкин — Личный кабинет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-grid">
    <div id="main-nav"></div>

    <main class="max-w-4xl mx-auto px-4 py-10">
        <h1 class="font-display text-3xl font-bold text-cyan-400 glow-text mb-8">Личный кабинет</h1>
        <div id="account-content"></div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/orders.js"></script>
    <script>
        renderNav('account');

        const params = new URLSearchParams(location.search);
        const redirect = params.get('redirect')
            || (location.pathname.endsWith('account.html') ? '/account.html' : '/index.html');

        let myOrders = [];
        let orderFilter = 'all';

        if (Auth.isLoggedIn()) {
            showProfile();
        } else {
            showAuthForms();
        }

        const ROLE_LABELS = { USER: 'Покупатель', ADMIN: 'Администратор' };

        function showProfile() {
            const user = Auth.getUser();
            const roleLabel = ROLE_LABELS[user.role] || user.role;
            const isAdmin = user.role === 'ADMIN';

            document.getElementById('account-content').innerHTML = `
                <div class="lg:grid lg:grid-cols-3 gap-8">
                    <aside class="lg:col-span-1 mb-8 lg:mb-0">
                        <div class="glass rounded-2xl p-6 text-center">
                            <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center text-3xl font-display font-bold">
                                ${user.username[0].toUpperCase()}
                            </div>
                            <h2 class="font-display text-xl text-cyan-300 mb-1">${escapeHtml(user.username)}</h2>
                            ${user.email ? `<p class="text-slate-500 text-sm mb-3">${escapeHtml(user.email)}</p>` : ''}
                            <span class="inline-block px-3 py-1 rounded-full text-sm font-semibold ${isAdmin ? 'bg-fuchsia-500/20 text-fuchsia-300' : 'bg-cyan-500/20 text-cyan-300'}">
                                ${roleLabel}
                            </span>
                            <div id="order-stats" class="mt-6 pt-6 border-t border-cyan-500/20 grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <p class="text-slate-500">Заказов</p>
                                    <p id="stat-count" class="font-display text-2xl text-cyan-400">—</p>
                                </div>
                                <div>
                                    <p class="text-slate-500">На сумму</p>
                                    <p id="stat-total" class="font-display text-lg text-fuchsia-400">—</p>
                                </div>
                            </div>
                            <div class="mt-6 space-y-2">
                                <a href="/catalog.html" class="btn-neon block py-2 rounded-lg font-bold text-sm">Каталог</a>
                                <a href="/cart.html" class="glass block py-2 rounded-lg font-bold text-sm text-cyan-400 border border-cyan-500/30 hover:bg-cyan-900/20">Корзина</a>
                                ${isAdmin ? '<a href="/admin.html" class="glass block py-2 rounded-lg font-bold text-sm text-fuchsia-400 border border-fuchsia-500/30 hover:bg-fuchsia-900/20">Панель админа</a>' : ''}
                                <button onclick="Auth.logout()" class="w-full mt-2 glass px-4 py-2 rounded-lg border border-rose-500/40 text-rose-400 hover:bg-rose-900/20 text-sm">
                                    Выйти
                                </button>
                            </div>
                        </div>
                    </aside>
                    <section class="lg:col-span-2">
                        <div class="flex flex-wrap gap-2 mb-4 border-b border-cyan-500/20 pb-2">
                            <button type="button" onclick="setOrderFilter('all')" id="filter-all" class="order-filter px-4 py-2 font-bold text-cyan-400 border-b-2 border-cyan-400">Все</button>
                            <button type="button" onclick="setOrderFilter('active')" id="filter-active" class="order-filter px-4 py-2 font-bold text-slate-500">В обработке</button>
                            <button type="button" onclick="setOrderFilter('done')" id="filter-done" class="order-filter px-4 py-2 font-bold text-slate-500">Завершённые</button>
                        </div>
                        <div id="order-history"><p class="text-slate-500 glass rounded-xl p-6 text-center">Загрузка...</p></div>
                    </section>
                </div>`;
            loadOrderHistory();
        }

        function setOrderFilter(filter) {
            orderFilter = filter;
            ['all', 'active', 'done'].forEach(f => {
                const btn = document.getElementById('filter-' + f);
                if (!btn) return;
                const active = f === filter;
                btn.className = 'order-filter px-4 py-2 font-bold ' +
                    (active ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-500 hover:text-cyan-300');
            });
            renderOrderList();
        }

        function filterOrders(orders) {
            if (orderFilter === 'active') {
                return orders.filter(o => o.status === 'PENDING');
            }
            if (orderFilter === 'done') {
                return orders.filter(o => o.status === 'CONFIRMED' || o.status === 'CANCELLED');
            }
            return orders;
        }

        function renderOrderList() {
            const el = document.getElementById('order-history');
            if (!el) return;

            const filtered = filterOrders(myOrders);
            if (!filtered.length) {
                const emptyMsg = orderFilter === 'all'
                    ? 'Заказов пока нет'
                    : 'Нет заказов в этой категории';
                el.innerHTML = `
                    <div class="glass rounded-xl p-8 text-center">
                        <p class="text-slate-400 mb-4">${emptyMsg}</p>
                        <a href="/catalog.html" class="btn-neon inline-block px-6 py-2 rounded-lg font-bold text-sm">Перейти в каталог</a>
                    </div>`;
                return;
            }
            el.innerHTML = filtered.map(o => renderOrderCard(o)).join('');
        }

        function updateOrderStats() {
            const countEl = document.getElementById('stat-count');
            const totalEl = document.getElementById('stat-total');
            if (!countEl || !totalEl) return;

            countEl.textContent = myOrders.length;
            const total = myOrders.reduce((s, o) => s + Number(o.totalPrice || 0), 0);
            totalEl.textContent = myOrders.length ? formatPrice(total) : formatPrice(0);
        }

        async function loadOrderHistory() {
            const el = document.getElementById('order-history');
            try {
                myOrders = await API.getMyOrders();
                updateOrderStats();
                renderOrderList();
            } catch (e) {
                if (el) el.innerHTML = `<p class="text-rose-400 glass rounded-xl p-6">${escapeHtml(e.message)}</p>`;
            }
        }

        function showAuthForms() {
            document.getElementById('account-content').innerHTML = `
                <div class="max-w-md mx-auto">
                    <div class="glass rounded-2xl p-6">
                        <div class="flex mb-6 border-b border-cyan-500/20">
                            <button type="button" id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 font-bold text-cyan-400 border-b-2 border-cyan-400">Вход</button>
                            <button type="button" id="tab-register" onclick="switchTab('register')" class="flex-1 py-2 font-bold text-slate-500">Регистрация</button>
                        </div>
                        <form id="form-login" onsubmit="doLogin(event)" class="space-y-4">
                            <div>
                                <label class="block text-slate-400 text-sm mb-1">Ник</label>
                                <input name="username" required autocomplete="username" class="w-full px-4 py-2 rounded-lg" placeholder="username">
                            </div>
                            <div>
                                <label class="block text-slate-400 text-sm mb-1">Пароль</label>
                                <input name="password" type="password" required autocomplete="current-password" class="w-full px-4 py-2 rounded-lg" placeholder="••••••">
                            </div>
                            <button type="submit" class="btn-neon w-full py-2 rounded-lg font-bold">Войти</button>
                        </form>
                        <form id="form-register" class="hidden space-y-4" onsubmit="doRegister(event)">
                            <div>
                                <label class="block text-slate-400 text-sm mb-1">Ник</label>
                                <input name="username" required minlength="3" autocomplete="username" class="w-full px-4 py-2 rounded-lg" placeholder="username">
                            </div>
                            <div>
                                <label class="block text-slate-400 text-sm mb-1">Почта</label>
                                <input name="email" type="email" required autocomplete="email" class="w-full px-4 py-2 rounded-lg" placeholder="email@example.com">
                            </div>
                            <div>
                                <label class="block text-slate-400 text-sm mb-1">Пароль</label>
                                <input name="password" type="password" required minlength="6" autocomplete="new-password" class="w-full px-4 py-2 rounded-lg" placeholder="мин. 6 символов">
                            </div>
                            <button type="submit" class="btn-neon w-full py-2 rounded-lg font-bold">Зарегистрироваться</button>
                        </form>
                    </div>
                    <p class="text-center text-slate-600 text-sm mt-4">Логин и пароль — латиница</p>
                </div>`;
        }

        function switchTab(tab) {
            document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
            document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
            document.getElementById('tab-login').className = 'flex-1 py-2 font-bold ' +
                (tab === 'login' ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-500');
            document.getElementById('tab-register').className = 'flex-1 py-2 font-bold ' +
                (tab === 'register' ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-500');
        }

        async function doLogin(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            try {
                const auth = await API.login({ username: fd.get('username'), password: fd.get('password') });
                Auth.save(auth);
                showToast('Добро пожаловать!', 'success');
                location.href = redirect;
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function doRegister(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            try {
                const auth = await API.register({
                    username: fd.get('username'),
                    email: fd.get('email'),
                    password: fd.get('password')
                });
                Auth.save(auth);
                showToast('Регистрация успешна!', 'success');
                location.href = redirect;
            } catch (err) { showToast(err.message, 'error'); }
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }
    </script>
</body>
</html>
